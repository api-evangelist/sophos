name: Sophos Vocabulary
description: >-
  Domain vocabulary for Sophos cybersecurity products and the Sophos Central API,
  covering threat detection, endpoint protection, incident response, and SIEM integration.
version: "1.0"
created: "2026-05-02"
modified: "2026-05-02"
terms:
  - term: Alert
    definition: >-
      A security notification generated by Sophos Central when a threat, policy violation,
      or security event requires attention. Alerts are severity-rated and include context
      about the affected endpoint and threat.
    tags:
      - Security
      - Threat Detection

  - term: Event
    definition: >-
      A discrete security occurrence recorded by Sophos Central including malware detections,
      policy changes, user actions, and system events. Events form an audit trail for security analysis.
    tags:
      - Security
      - Audit

  - term: Endpoint
    definition: >-
      A device managed by Sophos Central such as a workstation, server, or mobile device
      with the Sophos agent installed for protection and monitoring.
    tags:
      - Endpoint Protection

  - term: Tenant
    definition: >-
      An isolated organizational unit within Sophos Central used in multi-tenant deployments.
      Partners manage multiple customer tenants through the Central API.
    tags:
      - Multi-tenant

  - term: SIEM
    definition: >-
      Security Information and Event Management. The Sophos Central SIEM API enables
      integration with third-party SIEM platforms by providing alerts and events in
      machine-readable format.
    tags:
      - SIEM
      - Integration

  - term: Severity
    definition: >-
      The criticality rating assigned to an alert or event: low, medium, or high.
      High severity alerts require immediate investigation.
    values:
      - low
      - medium
      - high
    tags:
      - Alert
      - Triage

  - term: Threat
    definition: >-
      A detected malware, ransomware, PUA (potentially unwanted application), or other
      malicious artifact identified by Sophos endpoint protection.
    tags:
      - Threat Detection
      - Malware

  - term: API Key
    definition: >-
      The x-api-key header credential used for authenticating requests to the Sophos
      Central SIEM API alongside a Bearer token.
    tags:
      - Authentication

  - term: Bearer Token
    definition: >-
      An OAuth2 access token included in the Authorization header for Sophos Central
      API authentication.
    tags:
      - Authentication
      - OAuth2

  - term: Cursor
    definition: >-
      A pagination token returned by the Sophos SIEM API used to retrieve subsequent
      pages of alerts or events.
    tags:
      - Pagination

  - term: Partner
    definition: >-
      A Sophos reseller or managed security service provider who manages multiple
      customer organizations through the Sophos Central Partner API.
    tags:
      - Multi-tenant
      - Partner

  - term: Sophos Central
    definition: >-
      The cloud-based security management platform from Sophos that unifies endpoint,
      network, and cloud security management with centralized policy, alerting, and reporting.
    tags:
      - Platform
