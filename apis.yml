aid: sophos
name: Sophos
description: >-
  Sophos is a global cybersecurity leader delivering advanced endpoint protection, network security, cloud security, and
  SIEM integration through the Sophos Central platform. The Sophos Central API enables partners, organizations, and
  tenants to automate security operations including alert management, event retrieval, endpoint policy enforcement, and
  threat response.
